name: daily_manwon
description: "하루 만원 살기 플래너 - 귀여운 다람쥐와 함께하는 일일 예산 관리 앱"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.9

  # State Management (Riverpod 코드젠)
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # DI
  get_it: ^9.2.1
  injectable: ^2.7.1+4

  # Local Database (Drift - SQLite)
  drift: ^2.23.0
  drift_flutter: ^0.2.0

  # Model
  freezed_annotation: ^3.1.0

  # Animation
  flutter_animate: ^4.5.2

  # Charts
  fl_chart: ^0.69.0

  # 알림
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.1
  shared_preferences: ^2.3.0
  home_widget: ^0.6.0

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.5

dependency_overrides:
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.2.5
  injectable_generator: ^2.12.1
  drift_dev: ^2.23.0
  riverpod_generator: ^4.0.3

  # Testing
  mockito: ^5.4.6
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/character/
    - assets/images/category_images/
    - assets/images/icons/
    - assets/animations/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
